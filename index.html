<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1999</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#F8F5EF;
    color:#3A342E;

    font-family:
    "Noto Sans JP",
    sans-serif;

}

.container{

    width:min(900px,90%);
    margin:auto;

}

/* ---------- Header ---------- */

header{

    padding:70px 0;
    text-align:center;

}

header h1{

    font-size:72px;
    font-weight:300;
    letter-spacing:12px;

}

header p{

    margin-top:20px;

    font-size:20px;

    color:#7A7268;

}

/* ---------- Menu ---------- */

.menu{

    margin-top:80px;

    display:grid;

    gap:18px;

}

.menu a{

    text-decoration:none;

    color:#3A342E;

    padding:20px;

    border:1px solid #D8D1C7;

    transition:.3s;

    font-size:18px;

    background:white;

}

.menu a:hover{

    background:#E9E2D8;

}

/* ---------- Message ---------- */

.message{

    margin:100px 0;

    padding:40px;

    background:white;

    border-left:5px solid #A37B53;

}

.message h2{

    margin-bottom:15px;

    font-size:22px;

}

.message p{

    line-height:2;

    color:#666;

}

/* ---------- Footer ---------- */

footer{

    text-align:center;

    padding:60px 0;

    color:#888;

    font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<header>

<h1>1999</h1>

<p>
音楽と、ちょっといい時間を。
</p>

</header>

<section class="menu">

<a href="#">🎵 Music</a>

<a href="#">🎸 Live</a>

<a href="#">📷 Gallery</a>

<a href="#">☕ Diary</a>

<a href="#">👥 Members</a>

<a href="#">✉ Contact</a>

</section>

<section class="message">

<h2>Welcome.</h2>

<p>

好きなように過ごしてください。

一緒に歌ってもいいし、
静かに聴いてもいい。

コーヒーを飲みながら、
ゆっくり眺めてもいい。

1999は、
そんな場所でありたいと思っています。

</p>

</section>

<footer>

© 1999

</footer>

</div>

</body>

</html>
